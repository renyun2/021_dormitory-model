services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dorm
      POSTGRES_PASSWORD: dorm_secret
      POSTGRES_DB: dormitory
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dorm -d dormitory"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://dorm:dorm_secret@postgres:5432/dormitory
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    ports:
      - "8080:80"
    depends_on:
      - api
